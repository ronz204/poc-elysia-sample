name: sample-api

services:
  redis:
    image: redis:alpine3.23
    restart: unless-stopped
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - sample-network
    volumes:
      - redis-data:/data

volumes:
  redis-data:
    driver: local
    name: redis-data

networks:
  sample-network:
    driver: bridge
    name: sample-network
